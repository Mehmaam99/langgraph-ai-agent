<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mehmam AI — LangGraph Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --surface: #0d0d14;
      --surface2: #12121c;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.14);
      --text: #eeeef5;
      --muted: #5a5a72;
      --accent: #7c6af7;
      --accent2: #f76a8a;
      --accent3: #6af7c8;
      --glow: rgba(124, 106, 247, 0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 0%, rgba(124,106,247,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 100%, rgba(247,106,138,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(106,247,200,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,5,8,0.85);
      backdrop-filter: blur(24px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 20px rgba(124,106,247,0.35);
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      line-height: 1;
      text-transform: uppercase;
    }

    .brand-text p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 8px var(--accent3);
      animation: blink 2.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* ─── TOOLS STRIP ─── */
    .tools-strip {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 36px;
      height: 46px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,5,8,0.6);
      backdrop-filter: blur(12px);
      overflow-x: auto;
    }

    .tools-strip::-webkit-scrollbar { display: none; }

    .strip-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
      margin-right: 4px;
    }

    .tool-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 13px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      transition: all 0.25s ease;
      cursor: default;
    }

    .tool-pill.active {
      background: rgba(124,106,247,0.12);
      border-color: rgba(124,106,247,0.45);
      color: #c4baff;
      box-shadow: 0 0 12px rgba(124,106,247,0.2);
    }

    .tool-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.25s;
    }

    .tool-pill.active .tool-dot {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    /* ─── MAIN LAYOUT ─── */
    .main {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 20px 24px 20px;
      gap: 14px;
      overflow: hidden;
    }

    /* ─── MESSAGES ─── */
    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 6px;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 10px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 40px;
      animation: fadeIn 0.6s ease forwards;
    }

    .empty-glyph {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 0 24px rgba(124,106,247,0.5));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .empty-state h2 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      max-width: 340px;
      line-height: 1.7;
    }

    /* Message rows */
    .msg-row {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      animation: slideIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
    }

    .msg-row.user { flex-direction: row-reverse; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .av {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .msg-row.user .av {
      background: linear-gradient(135deg, #3b6af7, #6a9af7);
      box-shadow: 0 4px 14px rgba(59,106,247,0.3);
    }

    .msg-row.bot .av {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 4px 14px rgba(124,106,247,0.3);
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 78%;
    }

    .msg-row.user .msg-content { align-items: flex-end; }

    .bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .msg-row.user .bubble {
      background: linear-gradient(135deg, #2a4de0, #3b6af7);
      border-bottom-right-radius: 4px;
      color: white;
      box-shadow: 0 6px 20px rgba(42,77,224,0.25);
    }

    .msg-row.bot .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .tools-used {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tu-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 4px;
      background: rgba(124,106,247,0.08);
      border: 1px solid rgba(124,106,247,0.2);
      color: #a89ef7;
      letter-spacing: 0.3px;
    }

    /* Typing indicator */
    .typing-row {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      animation: slideIn 0.35s ease forwards;
      opacity: 0;
    }

    .typing-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 16px 20px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: typingBounce 1.1s infinite ease-in-out;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-7px); opacity: 1; }
    }

    /* ─── SUGGESTIONS ─── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sug {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11.5px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.2px;
    }

    .sug:hover {
      border-color: rgba(124,106,247,0.4);
      color: #c4baff;
      background: rgba(124,106,247,0.07);
    }

    /* ─── INPUT BAR ─── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 8px 8px 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-bar:focus-within {
      border-color: rgba(124,106,247,0.4);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.07), 0 8px 24px rgba(0,0,0,0.3);
    }

    .input-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      color: var(--text);
      caret-color: var(--accent);
    }

    .input-bar input::placeholder {
      color: var(--muted);
      font-size: 14px;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #9f6af7);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 4px 14px rgba(124,106,247,0.35);
    }

    .send-btn:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(124,106,247,0.5); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.25; cursor: not-allowed; filter: grayscale(1); transform: none; box-shadow: none; }

    /* Divider line */
    .divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      header { padding: 0 18px; }
      .tools-strip { padding: 0 18px; }
      .main { padding: 14px 14px; }
      .msg-content { max-width: 88%; }
      .status-text { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-mark">🔗</div>
      <div class="brand-text">
        <h1>Mehmam AI</h1>
        <p>Powered by LangGraph</p>
      </div>
    </div>
    <div class="header-right">
      <div class="status-dot"></div>
      <span class="status-text">AGENT READY</span>
    </div>
  </header>

  <div class="tools-strip">
    <span class="strip-label">Tools</span>
    <div class="tool-pill" id="chip-calculator"><div class="tool-dot"></div>Calculator</div>
    <div class="tool-pill" id="chip-datetime"><div class="tool-dot"></div>DateTime</div>
    <div class="tool-pill" id="chip-analyzer"><div class="tool-dot"></div>Text Analyzer</div>
    <div class="tool-pill" id="chip-knowledge"><div class="tool-dot"></div>Knowledge Base</div>
  </div>

  <div class="main">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-glyph">✦</div>
        <h2>System Initialized</h2>
        <p>Multi-step reasoning across tools. Ask anything or pick a suggestion below.</p>
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="sug" onclick="send('Calculate sqrt(144) * 5.5')">→ Math Calculation</button>
      <button class="sug" onclick="send('What is the current date and time?')">→ Get Timestamp</button>
      <button class="sug" onclick="send('Analyze this text: The future of AI lies in multi-agent collaboration.')">→ Analyze Text</button>
      <button class="sug" onclick="send('Tell me about Retrieval-Augmented Generation')">→ Knowledge Base</button>
    </div>

    <div class="input-bar">
      <input type="text" id="msgInput" placeholder="Ask the agent anything…"
        onkeypress="if(event.key==='Enter')sendMsg()">
      <div class="divider"></div>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const sessionId = 'session_' + Math.random().toString(36).substring(7);

    function send(text) {
      document.getElementById('msgInput').value = text;
      sendMsg();
    }

    async function sendMsg() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;

      // Hide empty state & suggestions on first message
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();
      document.getElementById('suggestions').style.display = 'none';

      addMsg(text, 'user', []);
      input.value = '';
      document.getElementById('sendBtn').disabled = true;
      showTyping();
      highlightTools([]);

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId })
        });
        const data = await res.json();
        removeTyping();
        if (res.ok) {
          addMsg(data.response, 'bot', data.tools_used || []);
          highlightTools(data.tools_used || []);
        } else {
          addMsg(`Error: ${data.detail}`, 'bot', [], true);
        }
      } catch (e) {
        removeTyping();
        addMsg(`Connection error: ${e.message}`, 'bot', [], true);
      }

      document.getElementById('sendBtn').disabled = false;
    }

    function addMsg(text, role, tools, isError = false) {
      const msgs = document.getElementById('messages');
      const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      const toolsHtml = tools.length
        ? `<div class="tools-used">${tools.map(t => `<span class="tu-badge">⚡ ${t}</span>`).join('')}</div>`
        : '';

      const row = document.createElement('div');
      row.className = `msg-row ${role}`;
      row.innerHTML = `
        <div class="av">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="msg-content">
          <div class="bubble" style="${isError ? 'border-color: rgba(247,106,106,0.4); color: #f76a6a;' : ''}">${formatted}</div>
          ${toolsHtml}
        </div>`;
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typing';
      row.innerHTML = `
        <div class="av" style="background: linear-gradient(135deg, #7c6af7, #f76a8a); box-shadow: 0 4px 14px rgba(124,106,247,0.3); width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;">🤖</div>
        <div class="typing-bubble"><span></span><span></span><span></span></div>`;
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() { document.getElementById('typing')?.remove(); }

    function highlightTools(activeTools) {
      ['calculator', 'datetime', 'analyzer', 'knowledge'].forEach(t => {
        const chip = document.getElementById(`chip-${t}`);
        const match = activeTools.some(a =>
          a.toLowerCase().includes(t) ||
          (t === 'datetime' && a.includes('current')) ||
          (t === 'analyzer' && a.includes('text'))
        );
        if (match) {
          chip.classList.add('active');
          setTimeout(() => chip.classList.remove('active'), 5000);
        }
      });
    }
  </script>
</body>
</html>
